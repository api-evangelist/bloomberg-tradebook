apis:
- aid: bloomberg-tradebook:tradebook-fix-api
  name: Bloomberg Tradebook FIX API
  description: FIX protocol connectivity to Bloomberg Tradebook for electronic order
    routing, execution reporting, and position updates across equities, futures, options,
    and FX markets. Supports FIX 4.2, 4.4, and 5.0.
  humanURL: https://www.bloomberg.com/professional/product/tradebook/
  baseURL: fixs://tradebook.bloomberg.com:8194
  tags:
  - FIX Protocol
  - Order Routing
  - Electronic Trading
  - Equities
  - Futures
  properties:
  - type: Documentation
    url: https://www.bloomberg.com/professional/product/tradebook/
- aid: bloomberg-tradebook:emsx-tradebook-integration
  name: Bloomberg EMSX-Tradebook Integration
  description: Integration between Bloomberg's Electronic Order Management System
    (EMSX) and Tradebook for seamless order routing from the Bloomberg Terminal to
    Tradebook execution desks and algorithms.
  humanURL: https://www.bloomberg.com/professional/solution/emsx/
  baseURL: blpapi://localhost:8194
  tags:
  - EMSX
  - Terminal Integration
  - Order Management
  properties:
  - type: Documentation
    url: https://www.bloomberg.com/professional/solution/emsx/
- aid: bloomberg-tradebook:tradebook-fx
  name: Bloomberg Tradebook FX Marketplace
  description: Bloomberg Tradebook's foreign exchange marketplace for electronic FX
    spot, forward, and swap execution. Launched in 2007, providing competitive FX
    pricing and execution from major liquidity providers.
  humanURL: https://www.bloomberg.com/professional/product/tradebook/
  baseURL: https://fx.tradebook.bloomberg.com
  tags:
  - FX
  - Foreign Exchange
  - Spot
  - Forward
  - Swap
  properties:
  - type: Documentation
    url: https://www.bloomberg.com/professional/product/tradebook/
