aid: bloomberg-tradebook
name: Bloomberg Tradebook
description: Bloomberg Tradebook is an electronic brokerage and agency trading platform
  offering execution services across global equities, futures, options, and foreign
  exchange. Founded in 1996 as a Bloomberg LP subsidiary, Tradebook provides algorithmic
  trading, direct market access, and transaction cost analysis (TCA) via FIX protocol
  connectivity and integration with Bloomberg Terminal workflows.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/bloomberg-tradebook/refs/heads/main/apis.yml
